<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar - Royal Cuts Barbearia</title>
    <meta name="description" content="Agende seu horario na Royal Cuts Barbearia. Corte, barba e estilo com excelencia.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            400: '#d4a853',
                            500: '#c9952d',
                            600: '#b8860b',
                        },
                        dark: {
                            900: '#0a0a0a',
                            800: '#111111',
                            700: '#1a1a1a',
                            600: '#222222',
                        }
                    },
                    fontFamily: {
                        heading: ['"Playfair Display"', 'serif'],
                        body: ['"Inter"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-dark-900 text-white font-body antialiased">

    <!-- Header -->
    <header id="header" class="fixed top-0 left-0 w-full z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <svg class="w-8 h-8 text-gold-500" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                <span class="font-heading text-xl font-semibold tracking-wider">ROYAL CUTS</span>
            </a>
            <nav class="hidden md:flex items-center gap-8">
                <a href="index.html" class="text-sm uppercase tracking-widest hover:text-gold-500 transition-colors">Inicio</a>
                <a href="index.html#servicos" class="text-sm uppercase tracking-widest hover:text-gold-500 transition-colors">Servicos</a>
                <a href="index.html#sobre" class="text-sm uppercase tracking-widest hover:text-gold-500 transition-colors">Sobre</a>
                <a href="index.html#contato" class="text-sm uppercase tracking-widest hover:text-gold-500 transition-colors">Contato</a>
            </nav>
            <a href="agendamento.html"
               class="hidden md:inline-flex items-center gap-2 bg-gold-500 text-dark-900 px-5 py-2 rounded-sm text-sm font-semibold uppercase tracking-wider hover:bg-gold-400 transition-colors">
                Agendar
            </a>
            <button id="menu-toggle" class="md:hidden text-white focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path id="menu-open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    <path id="menu-close" class="hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-dark-800 border-t border-dark-600">
            <nav class="flex flex-col items-center py-6 gap-6">
                <a href="index.html" class="text-sm uppercase tracking-widest hover:text-gold-500 transition-colors">Inicio</a>
                <a href="index.html#servicos" class="text-sm uppercase tracking-widest hover:text-gold-500 transition-colors">Servicos</a>
                <a href="index.html#sobre" class="text-sm uppercase tracking-widest hover:text-gold-500 transition-colors">Sobre</a>
                <a href="index.html#contato" class="text-sm uppercase tracking-widest hover:text-gold-500 transition-colors">Contato</a>
                <a href="agendamento.html"
                   class="inline-flex items-center gap-2 bg-gold-500 text-dark-900 px-5 py-2 rounded-sm text-sm font-semibold uppercase tracking-wider hover:bg-gold-400 transition-colors">
                    Agendar
                </a>
            </nav>
        </div>
    </header>

    <!-- Agendamento -->
    <section class="pt-32 pb-24 px-6">
        <div class="max-w-2xl mx-auto">
            <!-- Titulo -->
            <div class="text-center mb-12">
                <p class="text-gold-500 uppercase tracking-[0.3em] text-sm mb-4">Agendamento</p>
                <h1 class="font-heading text-4xl md:text-5xl font-bold mb-4">Reserve Seu Horario</h1>
                <p class="text-gray-400">Preencha os dados abaixo e agende pelo WhatsApp</p>
            </div>

            <!-- Formulario -->
            <form id="booking-form" class="bg-dark-800 border border-dark-600 rounded-sm p-6 md:p-10 space-y-6">

                <!-- Servico -->
                <div>
                    <label for="service" class="block text-sm font-medium text-gray-300 mb-2">Servico</label>
                    <select id="service" name="service" required
                            class="w-full bg-dark-700 border border-dark-600 rounded-sm px-4 py-3 text-white focus:outline-none focus:border-gold-500 transition-colors appearance-none cursor-pointer">
                        <option value="" disabled selected>Selecione um servico</option>
                        <option value="Corte Masculino - R$ 45">Corte Masculino - R$ 45</option>
                        <option value="Barba - R$ 35">Barba - R$ 35</option>
                        <option value="Combo Corte + Barba - R$ 70">Combo Corte + Barba - R$ 70</option>
                        <option value="Degrade - R$ 55">Degrade - R$ 55</option>
                        <option value="Sobrancelha - R$ 20">Sobrancelha - R$ 20</option>
                        <option value="Corte Infantil - R$ 30">Corte Infantil - R$ 30</option>
                    </select>
                </div>

                <!-- Data e Horario -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label for="date" class="block text-sm font-medium text-gray-300 mb-2">Data</label>
                        <input type="date" id="date" name="date" required
                               class="w-full bg-dark-700 border border-dark-600 rounded-sm px-4 py-3 text-white focus:outline-none focus:border-gold-500 transition-colors">
                    </div>
                    <div>
                        <label for="time" class="block text-sm font-medium text-gray-300 mb-2">Horario</label>
                        <select id="time" name="time" required
                                class="w-full bg-dark-700 border border-dark-600 rounded-sm px-4 py-3 text-white focus:outline-none focus:border-gold-500 transition-colors appearance-none cursor-pointer">
                            <option value="" disabled selected>Selecione</option>
                            <option value="09:00">09:00</option>
                            <option value="09:30">09:30</option>
                            <option value="10:00">10:00</option>
                            <option value="10:30">10:30</option>
                            <option value="11:00">11:00</option>
                            <option value="11:30">11:30</option>
                            <option value="12:00">12:00</option>
                            <option value="12:30">12:30</option>
                            <option value="13:00">13:00</option>
                            <option value="13:30">13:30</option>
                            <option value="14:00">14:00</option>
                            <option value="14:30">14:30</option>
                            <option value="15:00">15:00</option>
                            <option value="15:30">15:30</option>
                            <option value="16:00">16:00</option>
                            <option value="16:30">16:30</option>
                            <option value="17:00">17:00</option>
                            <option value="17:30">17:30</option>
                            <option value="18:00">18:00</option>
                            <option value="18:30">18:30</option>
                            <option value="19:00">19:00</option>
                            <option value="19:30">19:30</option>
                            <option value="20:00">20:00</option>
                        </select>
                    </div>
                </div>

                <!-- Nome -->
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-300 mb-2">Nome completo</label>
                    <input type="text" id="name" name="name" required placeholder="Seu nome"
                           class="w-full bg-dark-700 border border-dark-600 rounded-sm px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-gold-500 transition-colors">
                </div>

                <!-- Telefone -->
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-300 mb-2">Telefone</label>
                    <input type="tel" id="phone" name="phone" required placeholder="(00) 00000-0000"
                           class="w-full bg-dark-700 border border-dark-600 rounded-sm px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-gold-500 transition-colors">
                </div>

                <!-- Observacao (opcional) -->
                <div>
                    <label for="note" class="block text-sm font-medium text-gray-300 mb-2">Observacao <span class="text-gray-500">(opcional)</span></label>
                    <textarea id="note" name="note" rows="3" placeholder="Alguma informacao adicional..."
                              class="w-full bg-dark-700 border border-dark-600 rounded-sm px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-gold-500 transition-colors resize-none"></textarea>
                </div>

                <!-- Botao -->
                <button type="submit"
                        class="w-full flex items-center justify-center gap-3 bg-gold-500 text-dark-900 px-8 py-4 rounded-sm text-sm font-semibold uppercase tracking-wider hover:bg-gold-400 transition-all hover:scale-[1.02] active:scale-[0.98]">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                    </svg>
                    Agendar via WhatsApp
                </button>

                <!-- Mensagem de erro (oculta) -->
                <div id="form-error" class="hidden bg-red-500/10 border border-red-500/50 rounded-sm p-4 text-red-400 text-sm text-center">
                    Preencha todos os campos obrigatorios.
                </div>
            </form>

            <!-- Link voltar -->
            <div class="text-center mt-8">
                <a href="index.html" class="text-gray-500 hover:text-gold-500 transition-colors text-sm inline-flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                    </svg>
                    Voltar para a pagina inicial
                </a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-8 px-6 border-t border-dark-600">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <a href="index.html" class="flex items-center gap-2">
                <svg class="w-6 h-6 text-gold-500" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                <span class="font-heading text-lg font-semibold tracking-wider">ROYAL CUTS</span>
            </a>
            <p class="text-gray-500 text-sm">&copy; 2026 Royal Cuts. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Edigar Barbearia</title>
    <meta name="robots" content="noindex, nofollow">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 400: '#d4a853', 500: '#c9952d', 600: '#b8860b' },
                        dark: { 900: '#0a0a0a', 800: '#111111', 700: '#1a1a1a', 600: '#222222' }
                    },
                    fontFamily: {
                        heading: ['"Playfair Display"', 'serif'],
                        body: ['"Inter"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; }
        .font-heading { font-family: 'Playfair Display', serif; }
        .btn-confirm { background: #166534; color: #bbf7d0; }
        .btn-confirm:hover { background: #15803d; }
        .btn-cancel { background: #7f1d1d; color: #fecaca; }
        .btn-cancel:hover { background: #991b1b; }
        .status-pending { background: #713f12; color: #fde68a; }
        .status-confirmed { background: #14532d; color: #bbf7d0; }
        .status-cancelled { background: #450a0a; color: #fca5a5; text-decoration: line-through; }
    </style>
</head>
<body class="bg-dark-900 text-white font-body antialiased min-h-screen">

    <!-- Login -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-sm">
            <div class="text-center mb-8">
                <img src="assets/images/logo.png" alt="Edigar Barbearia" class="h-12 w-auto mx-auto mb-4">
                <h1 class="font-heading text-2xl font-bold">Painel Admin</h1>
                <p class="text-gray-400 text-sm mt-2">Edigar Barbearia</p>
            </div>
            <form id="login-form" class="bg-dark-800 border border-dark-600 rounded-sm p-6 space-y-4">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Senha</label>
                    <input type="password" id="password" required placeholder="Digite a senha"
                           class="w-full bg-dark-700 border border-dark-600 rounded-sm px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-gold-500 transition-colors">
                </div>
                <div id="login-error" class="hidden bg-red-500/10 border border-red-500/50 rounded-sm p-3 text-red-400 text-sm text-center" role="alert"></div>
                <button type="submit" id="login-btn"
                        class="w-full bg-gold-500 text-dark-900 px-6 py-3 rounded-sm text-sm font-semibold uppercase tracking-wider hover:bg-gold-400 transition-colors">
                    Entrar
                </button>
            </form>
            <p class="text-center text-gray-600 text-xs mt-6">&copy; 2025 Edigar Barbearia</p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
        <!-- Header -->
        <header class="bg-dark-800 border-b border-dark-600">
            <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <img src="assets/images/logo.png" alt="" class="h-8 w-auto">
                    <h1 class="font-heading text-lg font-semibold">Painel Admin</h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p id="current-date" class="text-gray-400 text-xs"></p>
                        <p id="current-time" class="text-gray-400 text-xs"></p>
                    </div>
                    <button id="logout-btn" class="text-gray-400 hover:text-white text-sm transition-colors">Sair</button>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
            <!-- Stats -->
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
                <div class="bg-dark-800 border border-dark-600 rounded-sm p-4">
                    <p class="text-gray-400 text-xs mb-1">Total do Dia</p>
                    <p id="stat-total" class="font-heading text-2xl font-bold text-gold-500">-</p>
                </div>
                <div class="bg-dark-800 border border-dark-600 rounded-sm p-4">
                    <p class="text-gray-400 text-xs mb-1">Receita</p>
                    <p id="stat-revenue" class="font-heading text-2xl font-bold text-gold-500">-</p>
                </div>
                <div class="bg-dark-800 border border-dark-600 rounded-sm p-4">
                    <p class="text-gray-400 text-xs mb-1">Pendentes</p>
                    <p id="stat-pending" class="font-heading text-2xl font-bold text-yellow-400">-</p>
                </div>
                <div class="bg-dark-800 border border-dark-600 rounded-sm p-4">
                    <p class="text-gray-400 text-xs mb-1">Confirmados</p>
                    <p id="stat-confirmed" class="font-heading text-2xl font-bold text-green-400">-</p>
                </div>
            </div>

            <!-- Navegador de Data -->
            <div class="bg-dark-800 border border-dark-600 rounded-sm p-4 mb-6 flex flex-col sm:flex-row items-center gap-4">
                <div class="flex items-center gap-2">
                    <button id="btn-today" class="bg-gold-500 text-dark-900 px-4 py-2 rounded-sm text-sm font-semibold hover:bg-gold-400 transition-colors">Hoje</button>
                    <button id="btn-tomorrow" class="bg-dark-700 text-gray-300 px-4 py-2 rounded-sm text-sm font-medium hover:bg-dark-600 transition-colors">Amanhã</button>
                </div>
                <div class="flex items-center gap-2">
                    <button id="btn-prev" class="bg-dark-700 text-gray-300 p-2 rounded-sm hover:bg-dark-600 transition-colors" aria-label="Dia anterior">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <p id="selected-date" class="text-white font-heading text-lg font-semibold min-w-[200px] text-center"></p>
                    <button id="btn-next" class="bg-dark-700 text-gray-300 p-2 rounded-sm hover:bg-dark-600 transition-colors" aria-label="Próximo dia">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>
                <div class="flex items-center gap-2">
                    <label for="date-picker" class="text-gray-400 text-sm">Data:</label>
                    <input type="date" id="date-picker"
                           class="bg-dark-700 border border-dark-600 rounded-sm px-3 py-2 text-sm text-white focus:outline-none focus:border-gold-500">
                </div>
            </div>

            <!-- Filtros + Busca -->
            <div class="flex flex-col sm:flex-row gap-4 mb-6">
                <div class="flex gap-2">
                    <button data-filter="all" class="filter-btn px-4 py-2 rounded-sm text-sm font-medium bg-gold-500 text-dark-900">Todos</button>
                    <button data-filter="pending" class="filter-btn px-4 py-2 rounded-sm text-sm font-medium bg-dark-700 text-gray-300 hover:bg-dark-600">Pendentes</button>
                    <button data-filter="confirmed" class="filter-btn px-4 py-2 rounded-sm text-sm font-medium bg-dark-700 text-gray-300 hover:bg-dark-600">Confirmados</button>
                </div>
                <div class="flex-1">
                    <input type="text" id="search-input" placeholder="Buscar por nome ou telefone..."
                           class="w-full bg-dark-700 border border-dark-600 rounded-sm px-4 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-gold-500">
                </div>
            </div>

            <!-- Loading -->
            <div id="loading" class="text-center py-12 text-gray-400">
                <svg class="w-8 h-8 animate-spin mx-auto mb-3 text-gold-500" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                Carregando dados...
            </div>

            <!-- Tabela -->
            <div id="table-wrapper" class="hidden">
                <div class="bg-dark-800 border border-dark-600 rounded-sm overflow-hidden">
                    <div class="px-6 py-4 border-b border-dark-600">
                        <h2 class="font-heading text-lg font-semibold">Agendamentos do Dia</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="border-b border-dark-600 text-gray-400 text-left">
                                    <th class="px-4 py-3 font-medium">Horário</th>
                                    <th class="px-4 py-3 font-medium">Serviço</th>
                                    <th class="px-4 py-3 font-medium">Cliente</th>
                                    <th class="px-4 py-3 font-medium">Telefone</th>
                                    <th class="px-4 py-3 font-medium">Status</th>
                                    <th class="px-4 py-3 font-medium text-right">Valor</th>
                                    <th class="px-4 py-3 font-medium text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="bookings-body"></tbody>
                        </table>
                    </div>
                    <div id="empty-state" class="hidden px-6 py-12 text-center text-gray-500">
                        Nenhum agendamento encontrado.
                    </div>
                </div>
            </div>

            <!-- Erro -->
            <div id="data-error" class="hidden bg-red-500/10 border border-red-500/50 rounded-sm p-4 text-red-400 text-sm text-center mt-4"></div>

            <!-- Status da atualização -->
            <p id="last-update" class="text-gray-600 text-xs text-center mt-4"></p>
        </main>
    </div>

    <script>
    (function() {
        const SERVICES = { 'Barba': 15, 'Combo Corte + Barba': 25, 'Degradê': 20, 'Corte Social': 20 };
        const MAX_ATTEMPTS = 3;
        const REFRESH_INTERVAL = 30000;
        let attempts = parseInt(sessionStorage.getItem('admin_attempts') || '0');
        let lockUntil = parseInt(sessionStorage.getItem('admin_lock') || '0');
        let currentFilter = 'all';
        let currentSearch = '';
        let allBookings = [];
        let refreshTimer = null;
        let selectedDate = new Date();

        const loginScreen = document.getElementById('login-screen');
        const dashboard = document.getElementById('dashboard');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const loading = document.getElementById('loading');
        const tableWrapper = document.getElementById('table-wrapper');
        const bookingsBody = document.getElementById('bookings-body');
        const emptyState = document.getElementById('empty-state');
        const statTotal = document.getElementById('stat-total');
        const statRevenue = document.getElementById('stat-revenue');
        const statPending = document.getElementById('stat-pending');
        const statConfirmed = document.getElementById('stat-confirmed');
        const dataError = document.getElementById('data-error');
        const searchInput = document.getElementById('search-input');
        const currentDate = document.getElementById('current-date');
        const currentTime = document.getElementById('current-time');
        const lastUpdate = document.getElementById('last-update');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const btnToday = document.getElementById('btn-today');
        const btnTomorrow = document.getElementById('btn-tomorrow');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const datePicker = document.getElementById('date-picker');
        const selectedDateEl = document.getElementById('selected-date');

        function formatSelectedDate() {
            return selectedDate.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }

        function getDateStr(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function updateSelectedDateUI() {
            selectedDateEl.textContent = formatSelectedDate();
            datePicker.value = getDateStr(selectedDate);
        }

        function isToday(date) {
            const today = new Date();
            return date.getFullYear() === today.getFullYear() && date.getMonth() === today.getMonth() && date.getDate() === today.getDate();
        }

        function isTomorrow(date) {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            return date.getFullYear() === tomorrow.getFullYear() && date.getMonth() === tomorrow.getMonth() && date.getDate() === tomorrow.getDate();
        }

        function changeDate(newDate) {
            selectedDate = newDate;
            updateSelectedDateUI();
            btnToday.classList.toggle('bg-gold-500', isToday(selectedDate));
            btnToday.classList.toggle('text-dark-900', isToday(selectedDate));
            btnToday.classList.toggle('bg-dark-700', !isToday(selectedDate));
            btnToday.classList.toggle('text-gray-300', !isToday(selectedDate));
            btnTomorrow.classList.toggle('bg-gold-500', isTomorrow(selectedDate));
            btnTomorrow.classList.toggle('text-dark-900', isTomorrow(selectedDate));
            btnTomorrow.classList.toggle('bg-dark-700', !isTomorrow(selectedDate));
            btnTomorrow.classList.toggle('text-gray-300', !isTomorrow(selectedDate));
            const pw = sessionStorage.getItem('admin_password');
            if (pw) loadDashboard(pw, true);
        }

        btnToday.addEventListener('click', () => changeDate(new Date()));
        btnTomorrow.addEventListener('click', () => {
            const t = new Date();
            t.setDate(t.getDate() + 1);
            changeDate(t);
        });
        btnPrev.addEventListener('click', () => {
            const d = new Date(selectedDate);
            d.setDate(d.getDate() - 1);
            changeDate(d);
        });
        btnNext.addEventListener('click', () => {
            const d = new Date(selectedDate);
            d.setDate(d.getDate() + 1);
            changeDate(d);
        });
        datePicker.addEventListener('change', () => {
            const parts = datePicker.value.split('-');
            changeDate(new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2])));
        });

        function updateClock() {
            const now = new Date();
            currentDate.textContent = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            currentTime.textContent = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        updateClock();
        setInterval(updateClock, 1000);

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                currentFilter = btn.dataset.filter;
                filterBtns.forEach(b => {
                    b.classList.remove('bg-gold-500', 'text-dark-900');
                    b.classList.add('bg-dark-700', 'text-gray-300');
                });
                btn.classList.remove('bg-dark-700', 'text-gray-300');
                btn.classList.add('bg-gold-500', 'text-dark-900');
                renderTable();
            });
        });

        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value.toLowerCase();
            renderTable();
        });

        const savedPassword = sessionStorage.getItem('admin_password');
        if (savedPassword) {
            updateSelectedDateUI();
            loadDashboard(savedPassword);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value.trim();
            if (!password) return;

            if (Date.now() < lockUntil) {
                const secs = Math.ceil((lockUntil - Date.now()) / 1000);
                loginError.textContent = `Bloqueado. Tente em ${secs}s.`;
                loginError.classList.remove('hidden');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Entrando...';
            loginError.classList.add('hidden');

            try {
                const res = await fetch('/api/admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, date: getDateStr(selectedDate) })
                });

                const data = await res.json();

                if (!res.ok) {
                    attempts++;
                    sessionStorage.setItem('admin_attempts', attempts);

                    if (res.status === 429) {
                        lockUntil = Date.now() + 60000;
                        sessionStorage.setItem('admin_lock', lockUntil);
                        loginError.textContent = data.error || 'Muitas tentativas. Bloqueado por 60s.';
                    } else if (attempts >= MAX_ATTEMPTS) {
                        lockUntil = Date.now() + 60000;
                        sessionStorage.setItem('admin_lock', lockUntil);
                        loginError.textContent = 'Muitas tentativas. Bloqueado por 60s.';
                    } else {
                        loginError.textContent = data.error || 'Senha incorreta.';
                    }
                    loginError.classList.remove('hidden');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Entrar';
                    return;
                }

                attempts = 0;
                sessionStorage.removeItem('admin_attempts');
                sessionStorage.removeItem('admin_lock');
                sessionStorage.setItem('admin_password', password);

                loginScreen.classList.add('hidden');
                dashboard.classList.remove('hidden');
                updateSelectedDateUI();
                renderDashboard(data);
                startAutoRefresh();
            } catch {
                loginError.textContent = 'Erro de conexão.';
                loginError.classList.remove('hidden');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Entrar';
            }
        });

        logoutBtn.addEventListener('click', () => {
            sessionStorage.removeItem('admin_password');
            dashboard.classList.add('hidden');
            loginScreen.classList.remove('hidden');
            document.getElementById('password').value = '';
            stopAutoRefresh();
        });

        function startAutoRefresh() {
            stopAutoRefresh();
            refreshTimer = setInterval(() => {
                const pw = sessionStorage.getItem('admin_password');
                if (pw) loadDashboard(pw, true);
            }, REFRESH_INTERVAL);
        }

        function stopAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
        }

        async function loadDashboard(password, silent) {
            if (!silent) {
                loginScreen.classList.add('hidden');
                dashboard.classList.remove('hidden');
                loading.classList.remove('hidden');
            }

            try {
                const res = await fetch('/api/admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, date: getDateStr(selectedDate) })
                });

                const data = await res.json();

                if (!res.ok) {
                    if (res.status === 401) {
                        sessionStorage.removeItem('admin_password');
                        loginScreen.classList.remove('hidden');
                        dashboard.classList.add('hidden');
                        stopAutoRefresh();
                    } else if (res.status === 429) {
                        dataError.textContent = 'Muitas requisições. Aguarde 60 segundos.';
                        dataError.classList.remove('hidden');
                    } else {
                        dataError.textContent = data.error || 'Erro ao carregar dados.';
                        dataError.classList.remove('hidden');
                    }
                    return;
                }

                renderDashboard(data);
                lastUpdate.textContent = `Atualizado às ${new Date().toLocaleTimeString('pt-BR')}`;
            } catch {
                if (!silent) {
                    loading.classList.add('hidden');
                    dataError.textContent = 'Erro ao carregar dados.';
                    dataError.classList.remove('hidden');
                }
            }
        }

        function renderDashboard(data) {
            loading.classList.add('hidden');
            dataError.classList.add('hidden');
            allBookings = data.bookings || [];

            const tableTitle = document.querySelector('#table-wrapper .font-heading');
            if (tableTitle) {
                const d = new Date(getDateStr(selectedDate) + 'T12:00:00');
                const dateLabel = isToday(selectedDate) ? 'Hoje' : d.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
                tableTitle.textContent = `Agendamentos — ${dateLabel}`;
            }

            const pending = allBookings.filter(b => b.status === 'pending').length;
            const confirmed = allBookings.filter(b => b.status === 'confirmed').length;

            statTotal.textContent = allBookings.length;
            statRevenue.textContent = `R$ ${(data.totalRevenue || 0).toFixed(2)}`;
            statPending.textContent = pending;
            statConfirmed.textContent = confirmed;

            renderTable();
        }

        function renderTable() {
            bookingsBody.innerHTML = '';
            let filtered = allBookings;

            if (currentFilter !== 'all') {
                filtered = filtered.filter(b => b.status === currentFilter);
            }

            if (currentSearch) {
                filtered = filtered.filter(b =>
                    (b.name || '').toLowerCase().includes(currentSearch) ||
                    (b.phone || '').replace(/\D/g, '').includes(currentSearch.replace(/\D/g, ''))
                );
            }

            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                tableWrapper.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            tableWrapper.classList.remove('hidden');

            filtered.forEach(b => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-dark-600 hover:bg-dark-700 transition-colors';

                const tdTime = document.createElement('td');
                tdTime.className = 'px-4 py-3 whitespace-nowrap font-medium';
                tdTime.textContent = b.time;

                const tdService = document.createElement('td');
                tdService.className = 'px-4 py-3';
                tdService.textContent = b.service;

                const tdName = document.createElement('td');
                tdName.className = 'px-4 py-3';
                tdName.textContent = b.name;

                const tdPhone = document.createElement('td');
                tdPhone.className = 'px-4 py-3 whitespace-nowrap';
                tdPhone.textContent = b.phone;

                const tdStatus = document.createElement('td');
                tdStatus.className = 'px-4 py-3';
                const statusSpan = document.createElement('span');
                statusSpan.className = `px-2 py-1 rounded-sm text-xs font-medium status-${b.status}`;
                statusSpan.textContent = b.status === 'pending' ? 'Pendente' : b.status === 'confirmed' ? 'Confirmado' : 'Cancelado';
                tdStatus.appendChild(statusSpan);

                const tdPrice = document.createElement('td');
                tdPrice.className = 'px-4 py-3 text-right font-medium text-gold-500';
                tdPrice.textContent = `R$ ${(b.price || 0).toFixed(2)}`;

                const tdActions = document.createElement('td');
                tdActions.className = 'px-4 py-3 text-center';

                if (b.status === 'pending') {
                    const confirmBtn = document.createElement('button');
                    confirmBtn.className = 'btn-confirm px-3 py-1 rounded-sm text-xs font-medium mr-1';
                    confirmBtn.textContent = 'Confirmar';
                    confirmBtn.addEventListener('click', () => confirmBooking(b.date, b.time));

                    const cancelBtn = document.createElement('button');
                    cancelBtn.className = 'btn-cancel px-3 py-1 rounded-sm text-xs font-medium';
                    cancelBtn.textContent = 'Cancelar';
                    cancelBtn.addEventListener('click', () => cancelBooking(b.date, b.time, b.name));

                    tdActions.appendChild(confirmBtn);
                    tdActions.appendChild(cancelBtn);
                } else if (b.status === 'confirmed') {
                    const phoneClean = (b.phone || '').replace(/\D/g, '');
                    const dateObj = new Date(b.date + 'T12:00:00');
                    const dateFormatted = dateObj.toLocaleDateString('pt-BR', {
                        weekday: 'long', day: '2-digit', month: 'long', year: 'numeric'
                    });
                    const msg = `Olá, ${b.name}! Seu agendamento na Edigar Barbearia foi confirmado!\n\nServiço: ${b.service}\nData: ${dateFormatted}\nHorário: ${b.time}\n\nAguardamos você!`;
                    const waUrl = `https://wa.me/55${phoneClean}?text=${encodeURIComponent(msg)}`;

                    const waBtn = document.createElement('a');
                    waBtn.href = waUrl;
                    waBtn.target = '_blank';
                    waBtn.className = 'btn-confirm px-3 py-1 rounded-sm text-xs font-medium mr-1 inline-block no-underline';
                    waBtn.textContent = 'WhatsApp';

                    const cancelBtn = document.createElement('button');
                    cancelBtn.className = 'btn-cancel px-3 py-1 rounded-sm text-xs font-medium';
                    cancelBtn.textContent = 'Cancelar';
                    cancelBtn.addEventListener('click', () => cancelBooking(b.date, b.time, b.name));

                    tdActions.appendChild(waBtn);
                    tdActions.appendChild(cancelBtn);
                }

                tr.appendChild(tdTime);
                tr.appendChild(tdService);
                tr.appendChild(tdName);
                tr.appendChild(tdPhone);
                tr.appendChild(tdStatus);
                tr.appendChild(tdPrice);
                tr.appendChild(tdActions);
                bookingsBody.appendChild(tr);
            });
        }

        async function confirmBooking(date, time) {
            const password = sessionStorage.getItem('admin_password');
            try {
                const res = await fetch('/api/confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, date, time })
                });

                const data = await res.json();

                if (res.ok) {
                    loadDashboard(password, true);

                    if (data.booking) {
                        const b = data.booking;
                        const dateObj = new Date(b.date + 'T12:00:00');
                        const dateFormatted = dateObj.toLocaleDateString('pt-BR', {
                            weekday: 'long', day: '2-digit', month: 'long', year: 'numeric'
                        });
                        const msg = `Olá, ${b.name}! Seu agendamento na Edigar Barbearia foi confirmado!\n\nServiço: ${b.service}\nData: ${dateFormatted}\nHorário: ${b.time}\n\nAguardamos você!`;
                        const phone = (b.phone || '').replace(/\D/g, '');
                        const waUrl = `https://wa.me/55${phone}?text=${encodeURIComponent(msg)}`;
                        window.open(waUrl, '_blank');
                    }
                } else {
                    alert(data.error || 'Erro ao confirmar.');
                }
            } catch {
                alert('Erro de conexão.');
            }
        }

        async function cancelBooking(date, time, name) {
            if (!confirm(`Cancelar agendamento de ${name} às ${time}?`)) return;

            const password = sessionStorage.getItem('admin_password');
            try {
                const res = await fetch('/api/cancel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, date, time })
                });

                if (res.ok) {
                    loadDashboard(password, true);
                } else {
                    const data = await res.json();
                    alert(data.error || 'Erro ao cancelar.');
                }
            } catch {
                alert('Erro de conexão.');
            }
        }
    })();
    </script>
